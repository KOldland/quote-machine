<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <title>Register User – Quote Machine</title>
    <style>
        .register-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f4f5f7;
        }
        .register-card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,.12);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 420px;
        }
        .register-card h1 {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .register-card .field {
            margin-bottom: 1rem;
        }
        .register-card label {
            display: block;
            font-size: .85rem;
            font-weight: 600;
            margin-bottom: .3rem;
        }
        .register-card input[type="text"],
        .register-card input[type="password"],
        .register-card select {
            width: 100%;
            padding: .5rem .75rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .register-card button {
            width: 100%;
            padding: .65rem;
            background: #1b3a6b;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: .5rem;
        }
        .register-card button:hover { background: #14305a; }
        .flash-messages { margin-bottom: 1rem; }
        .flash-messages .flash {
            padding: .5rem .75rem;
            border-radius: 4px;
            font-size: .9rem;
            margin-bottom: .4rem;
        }
        .flash.success { background: #d4edda; color: #155724; }
        .flash.error   { background: #f8d7da; color: #721c24; }
        .flash.warning { background: #fff3cd; color: #856404; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #1b3a6b;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="register-wrapper">
    <div class="register-card">
        <h1>Register New User</h1>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('register') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="field">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" autocomplete="name" placeholder="John Doe">
            </div>
            
            <div class="field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" autocomplete="username" required placeholder="johndoe">
            </div>
            
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="new-password" required placeholder="Minimum 6 characters">
            </div>
            
            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" required placeholder="Re-enter password">
            </div>
            
            <div class="field">
                <label for="role">User Role</label>
                <select id="role" name="role">
                    <option value="user">User (Can complete forms)</option>
                    <option value="admin">Admin (Can edit forms & manage users)</option>
                </select>
            </div>
            
            <button type="submit">Register User</button>
        </form>
        
        <a href="{{ url_for('list_users') }}" class="back-link">← Back to User Management</a>
    </div>
</div>
</body>
</html>
